name: Visualize Holocene DA Results

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Holocene DA Reconstruction"]
    types: [completed]

jobs:
  find-latest-run:
    name: Find Latest Reconstruction Run
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    outputs:
      run_number: ${{ steps.get_run.outputs.run_number }}
      run_id: ${{ steps.get_run.outputs.run_id }}
      artifact_name: ${{ steps.get_run.outputs.artifact_name }}

    steps:
        - name: Find reconstruction run and artifact
          id: get_run
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              run_id="${{ github.event.workflow_run.id }}"
              run_number="${{ github.event.workflow_run.run_number }}"
            else
              latest_run=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/actions/workflows/holocene_da.yml/runs?status=success&per_page=1" \
                --jq '.workflow_runs[0]')
              run_id=$(echo "$latest_run" | jq -r '.id')
              run_number=$(echo "$latest_run" | jq -r '.run_number')
            fi

            if [ "$run_id" = "null" ] || [ -z "$run_id" ]; then
              echo "Error: No successful Holocene DA runs found"
              exit 1
            fi

            artifact_name="holocene-da-reconstruction-${run_id}"
            echo "run_id=$run_id" >> $GITHUB_OUTPUT
            echo "run_number=$run_number" >> $GITHUB_OUTPUT
            echo "artifact_name=$artifact_name" >> $GITHUB_OUTPUT

  download-artifact:
    name: Download Reconstruction Artifact
    needs: find-latest-run
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact from reconstruction run
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.find-latest-run.outputs.artifact_name }}
          path: ./recon-data
          run-id: ${{ needs.find-latest-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify downloaded files
        run: |
          echo "Downloaded reconstruction artifacts:"
          ls -lh ./recon-data/
          echo ""
          echo "NetCDF files:"
          find ./recon-data -type f -name "*.nc" | head -20

      - name: Flatten directory structure
        run: |
          echo "Flattening directory structure for presto-viz..."
          find ./recon-data -type f -name "*.nc" -exec mv {} ./recon-data/ \;
          find ./recon-data -type d -empty -delete
          echo ""
          echo "Files after flattening:"
          ls -lh ./recon-data/

      - name: Generate configs.yml for visualization
        run: |
          if [ ! -f ./recon-data/configs.yml ] && [ -f config/user_config.yml ]; then
            echo "Generating configs.yml from user_config.yml..."
            python3 -c "
          import yaml
          with open('config/user_config.yml') as f:
              flat = yaml.safe_load(f)
          nested = {'presto_config': {k: {'value': str(v)} for k, v in flat.items()}}
          with open('recon-data/configs.yml', 'w') as f:
              yaml.dump(nested, f, default_flow_style=False)
          "
            echo "Generated configs.yml:"
            cat ./recon-data/configs.yml
          elif [ -f ./recon-data/configs.yml ]; then
            echo "configs.yml already present in artifact"
          else
            echo "WARNING: No config file found, visualization may fail"
          fi

      - name: Re-upload for presto-viz
        uses: actions/upload-artifact@v4
        with:
          name: recon-data-for-viz-${{ github.run_number }}
          path: ./recon-data/
          retention-days: 7

  visualize:
    name: Generate Presto Visualization
    needs: [find-latest-run, download-artifact]
    uses: DaveEdge1/presto-viz/.github/workflows/presto-viz-reusable.yml@main
    with:
      reconstruction_id: HoloceneDA_Run_${{ needs.find-latest-run.outputs.run_number }}_Reviz_${{ github.run_number }}
      artifact_name: recon-data-for-viz-${{ github.run_number }}

  deploy-to-github-pages:
    name: Deploy to GitHub Pages
    needs: [find-latest-run, visualize]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download visualization artifact
        uses: actions/download-artifact@v4
        with:
          name: presto-viz-output-HoloceneDA_Run_${{ needs.find-latest-run.outputs.run_number }}_Reviz_${{ github.run_number }}
          path: ./visualization-output

      - name: Prepare Pages content
        run: |
          find ./visualization-output -type f -name "*.zip" -delete
          if [ -d "visualization-output/viz" ]; then
            mv visualization-output/viz visualization-output/docs
          fi
          echo '<meta http-equiv="refresh" content="0; url=docs/visualizer.html">' > ./visualization-output/index.html
          ls -lah ./visualization-output/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./visualization-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Homepage URL is set by the PReSto webhook handler using the user's
      # OAuth token (GITHUB_TOKEN lacks admin permission to update repo settings).
